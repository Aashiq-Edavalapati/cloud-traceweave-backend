name: Trigger auto deployment for traceweave-backend

on:
  push:
    branches: [ main ]
    paths:
      - 'core-api/**'
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TRACEWEAVEBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TRACEWEAVEBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TRACEWEAVEBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/core-api
          dockerfilePath: Dockerfile
          # Point to your NEW registry
          registryUrl: ${{ secrets.TRACEWEAVEBACKEND_REGISTRY_URL }}
          registryUsername: ${{ secrets.TRACEWEAVEBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.TRACEWEAVEBACKEND_REGISTRY_PASSWORD }}
          containerAppName: traceweave-backend
          resourceGroup: TraceWeave_RG
          # Use your registry URL in the image name
          imageToBuild: ${{ secrets.TRACEWEAVEBACKEND_REGISTRY_URL }}/traceweave-backend:${{ github.sha }}
