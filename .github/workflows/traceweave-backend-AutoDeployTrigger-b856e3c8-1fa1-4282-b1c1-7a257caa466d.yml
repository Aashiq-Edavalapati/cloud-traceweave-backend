name: Trigger auto deployment for traceweave-backend

on:
  push:
    branches: 
      [ main ]
    paths:
      - 'core-api/**' # Only trigger when code in core-api changes
      - '.github/workflows/traceweave-backend-AutoDeployTrigger-*.yml'

  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4 # Updated to v4 for better performance

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TRACEWEAVEBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TRACEWEAVEBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TRACEWEAVEBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          # FIX: Point to the subfolder where your code lives
          appSourcePath: ${{ github.workspace }}/core-api 
          
          # FIX: Path to Dockerfile relative to appSourcePath
          dockerfilePath: Dockerfile 
          
          registryUrl: 
          registryUsername: ${{ secrets.TRACEWEAVEBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.TRACEWEAVEBACKEND_REGISTRY_PASSWORD }}
          containerAppName: traceweave-backend
          resourceGroup: TraceWeave_RG
          # Using the commit SHA ensures every deployment is unique
          imageToBuild: traceweave-backend:${{ github.sha }}
